[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[redirects]]
  from = "/wiki"
  to = "/wiki/index"
  status = 301

[[redirects]]
  from = "/api/report"
  to = "/.netlify/functions/report"
  status = 200

[[redirects]]
  from = "/api/terrain"
  to = "/.netlify/functions/terrain"
  status = 200
